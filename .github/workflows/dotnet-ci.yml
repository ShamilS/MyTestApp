name: .NET CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest        # free GitHub-hosted runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.203'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build MyApp.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test MyApp.slnx --no-build --configuration Release --verbosity normal
        
      # 1. Cache NuGet packages to speed up runs
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # 2. Publish test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'